<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Details</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h1 class="display-4">{{ course.name }}</h1>
    
    <div class="card mt-4">
        <div class="card-header">
            <h3>Lessons</h3>
        </div>
        <ul class="list-group list-group-flush">
            {% for lesson in course.lesson_set.all %}
            <li class="list-group-item">
                <h5 class="mb-1">{{ lesson.title }}</h5>
                <p class="text-muted small">{{ lesson.content }}</p>
            </li>
            {% empty %}
            <li class="list-group-item text-warning">No lessons available for this course.</li>
            {% endfor %}
        </ul>
    </div>
    
    <a href="{% url 'onlinecourse:index' %}" class="btn btn-primary mt-3">Back to Course List</a>
</div>
</body>
</html>
